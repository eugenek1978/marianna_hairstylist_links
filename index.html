<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Book with Marianna (Modmop, Ottawa)</title>
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:#0f172a;
      color:#e2e8f0;
    }
    .wrap{
      max-width:480px;
      margin:0 auto;
      padding:32px 18px 56px;
      text-align:center;
    }
    img.avatar{
      width:96px;
      height:96px;
      border-radius:999px;
      object-fit:cover;
      border:2px solid rgba(226,232,240,0.25);
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
      background:#1e293b;
      display:block;
      margin:0 auto 16px;
    }
    h1{
      margin:0 0 8px 0;
      font-size:22px;
      letter-spacing:.2px;
    }
    .subtitle{
      margin:0 0 22px 0;
      color:rgba(226,232,240,0.85);
      font-size:14px;
      line-height:1.45;
    }
    .buttons{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:10px;
    }
    a.btn{
      display:block;
      padding:13px 16px;
      border-radius:14px;
      text-decoration:none;
      color:#0f172a;
      background:#e2e8f0;
      font-weight:650;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
      transition:transform .08s ease, filter .08s ease;
    }
    a.btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.03);
    }
    a.btn:active{
      transform:translateY(0px);
    }
    footer{
      margin-top:32px;
      color:rgba(226,232,240,0.65);
      font-size:12px;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Book with Marianna</h1>
    <div class="subtitle">
      Hairstylist at Modmop (ByWard Market, Ottawa)
    </div>

    <div class="buttons">
      <a class="btn" href="https://www.phorest.com/salon/modmophairdressing" target="_blank" rel="noopener">Book appointment</a>
      <a class="btn" href="https://www.instagram.com/kin_marianna_hairstylist/" target="_blank" rel="noopener">View my work</a>
      <a class="btn" href="https://www.google.com/maps/search/?api=1&query=Modmop+Hairdressing+Ottawa+reviews" target="_blank" rel="noopener">Leave a review</a>
    </div>

    <footer>
      Quick tip: if you are a new client, book a consultation or send a message and Marianna will help you choose the right service.
    </footer>
  </div>
</body>
</html>
